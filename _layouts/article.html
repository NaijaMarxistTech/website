<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ site.title }}: {{ page.title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/sections.css">
  <link rel="stylesheet" href="/css/pages.css">
</head>
<body>
  <div class="article-container">
    <h1>{{ page.title }}</h1>
    <div class="article-meta">
      {{ page.category }} &nbsp;|&nbsp; {{ page.date | date: "%-d %B %Y" }}
    </div>
    {{ content }}
    <p class="back-link"><a href="/#analysis">← Back to analysis</a></p>
  </div>
  <script src="/js/masthead.js"></script>
  <script src="/js/scroll.js"></script>
</body>
</html>
