<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Naija Marxists</title>
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <!-- using Oswald -->
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- Stylesheets -->
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/layout.css" />
  <link rel="stylesheet" href="/css/sections.css" />
  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="/assets/favicons/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/favicons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicons/favicon-16x16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicons/favicon-32x32.png">
  <link rel="apple-touch-icon" sizes="512x512" href="/assets/favicons/favicon-512x512.png">
  <link rel="icon" type="image/svg+xml" href="/assets/favicons/favicon.svg">
  <link rel="manifest" href="/assets/favicons/site.webmanifest">

</head>
<body>

  {% unless page.hide_header %}
    {% include header.html %}
    {% include hero.html %}
  {% endunless %}

  <main class="page-wrap">
    {{ content }}
  </main>

  {% unless page.hide_footer %}
    {% include footer.html %}
  {% endunless %}

  <!-- Load Supabase library once globally -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Expose Supabase keys globally -->
  <script>
    // Initialize Supabase once globally
    window.SUPABASE_URL = '{{ site.env.SUPABASE_URL }}';
    window.SUPABASE_ANON_KEY = '{{ site.env.SUPABASE_ANON_KEY }}';
    
    if (typeof window.supabase !== 'undefined') {
      window.supabaseClient = window.supabase.createClient(
        window.SUPABASE_URL,
        window.SUPABASE_ANON_KEY
      );
      console.log("Supabase client initialized globally");
    } else {
      console.error("Supabase library not loaded!");
    }
  </script>

  <script src="/js/masthead.js"></script>
  <script src="/js/scroll.js"></script>
  <script src="{{ site.baseurl }}/js/contact.js"></script>
  <script src="{{ site.baseurl }}/js/signup.js"></script>
</body>
</html>
