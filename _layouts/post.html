---
layout: default
---
<div class="post-header">
  <div class="section-label">Analysis &amp; Articles</div>
  <p class="byline" style="margin-bottom:0.5rem;">{{ page.category }} &nbsp;|&nbsp; {{ page.date | date: "%B %d, %Y" }}</p>
  <h1 style="font-family:var(--display); font-size:clamp(1.6rem, 5vw, 2.4rem); color:var(--navy); margin-bottom:1rem;">{{ page.title }}</h1>
</div>

<div class="post-content" style="font-size:1.05rem; line-height:1.7; max-width:720px;">
  {{ content }}
</div>

<div style="margin-top:2.5rem; padding-top:1rem; border-top:1px solid var(--off);">
  <a href="{{ site.baseurl }}/#analysis" class="read-more">← Back to all analysis</a>
</div>
