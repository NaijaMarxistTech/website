title: The Naija Marxists
description: Scientific Socialism • Class Struggle • Nigerian Liberation
url: "https://thenaijamarxists.org"   # your custom domain
baseurl: ""                            # important: leave empty for custom domain
markdown: kramdown
highlighter: rouge
permalink: /analysis/:title/           # nice URLs like /analysis/oil-subsidy/

# Collections (optional for statements later)
collections:
  statements:
    output: true
    permalink: /statements/:title/
  
defaults:
  - scope:
      type: "posts"
    values:
      hide_header: true
      hide_footer: true
      layout: "article"

plugins:
  - jekyll-environment-variables